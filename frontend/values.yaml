replicaCount: 2
image:
  repository: amrhatem/frontend-app 
  pullPolicy: Always            
  tag: "${IMAGE_TAG}"           
service:
  type: ClusterIP
  port: 80
ingress:
  enabled: true
  className: "nginx" 
  hosts:
    - host: frontend.example.com 
      paths:
        - path: /
          pathType: Prefix
  tls: 
    - secretName: frontend-tls
      hosts:
        - frontend.example.com 
resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "200m"
    memory: "256Mi"
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
livenessProbe:
  httpGet:
    path: / 
    port: 80
  initialDelaySeconds: 15
  timeoutSeconds: 5
readinessProbe:
  httpGet:
    path: / 
    port: 80
  initialDelaySeconds: 10
  timeoutSeconds: 5
