ReplicaCount: 2
image:
  repository: omareltabakh/backend-app
  pullPolicy: IfNotPresent 
  tag: "latest" 

service:
  type: ClusterIP
  port: 80

livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 15
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 10
  timeoutSeconds: 5
resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "200m"
    memory: "256Mi"
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
env:
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: mongodb-secrets
        key: mongodb-url
serviceAccount:
  create: true
ingress:
  enabled: false 
